<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>runwithgratitude.ca</title>
<meta http-equiv="refresh" content="4;url=./convite.html">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1a3a5c 0%,#2e6da4 100%);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    text-align:center;padding:2rem;
  }
  .card{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    border-radius:24px;
    padding:3rem 2.5rem;
    max-width:420px;
    width:100%;
  }
  .lock{font-size:3.5rem;margin-bottom:1rem}
  h1{color:#fff;font-size:1.4rem;font-weight:900;margin-bottom:.5rem}
  p{color:rgba(255,255,255,.7);font-size:.95rem;line-height:1.6;margin-bottom:1.75rem}
  .btn{
    display:inline-block;
    background:#f1c40f;color:#1a252f;
    border:none;border-radius:50px;
    padding:.85rem 2rem;
    font-size:1rem;font-weight:800;
    text-decoration:none;cursor:pointer;
    transition:opacity .2s;
  }
  .btn:hover{opacity:.88}
  .redirect-note{
    margin-top:1.25rem;
    font-size:.75rem;
    color:rgba(255,255,255,.4);
  }
</style>
</head>
<body>
<div class="card">
  <div class="lock">🔒</div>
  <h1>Site Pessoal</h1>
  <p>Esta página é de uso pessoal e não está disponível ao público.<br>
  Se você recebeu um convite para o <strong style="color:#fff">Desafio 64km</strong>, clique abaixo.</p>
  <a href="./convite.html" class="btn">🏃 Ver o Convite</a>
  <div class="redirect-note">Redirecionando automaticamente em alguns segundos…</div>
</div>
<script>
  setTimeout(function(){ window.location.replace('./convite.html'); }, 4000);
</script>
</body>
</html>
