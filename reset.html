<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Limpando cache…</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#1a3a5c;font-family:-apple-system,sans-serif;text-align:center;padding:2rem}
  .card{color:#fff;max-width:360px}
  .spin{font-size:3rem;animation:spin 1s linear infinite;display:inline-block;margin-bottom:1rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  h2{font-size:1.2rem;font-weight:800;margin-bottom:.5rem}
  p{font-size:.9rem;color:rgba(255,255,255,.7);line-height:1.6}
  .done{display:none}
  .done .spin{animation:none}
</style>
</head>
<body>
<div class="card" id="box">
  <div class="spin">⚙️</div>
  <h2>Limpando cache…</h2>
  <p>Aguarde, removendo service worker e dados em cache.</p>
</div>
<script>
async function reset(){
  // Unregister all service workers
  if('serviceWorker' in navigator){
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r => r.unregister()));
  }
  // Delete all caches
  const keys = await caches.keys();
  await Promise.all(keys.map(k => caches.delete(k)));
  // Done — redirect to app
  document.getElementById('box').innerHTML =
    '<div style="font-size:3rem;margin-bottom:1rem">✅</div>'
    +'<h2 style="color:#2ecc71">Pronto!</h2>'
    +'<p style="margin-bottom:1.5rem">Cache limpo. Abrindo o app…</p>';
  setTimeout(() => { window.location.replace('./app.html'); }, 1500);
}
reset().catch(() => { window.location.replace('./app.html'); });
</script>
</body>
</html>
