<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏐 VNL Feminina 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08101e;
  --surf:#0d1a30;
  --card:#112040;
  --card2:#162850;
  --orange:#f46f00;
  --orange2:#ffb347;
  --live:#00e676;
  --white:#fff;
  --muted:rgba(255,255,255,.5);
  --border:rgba(255,255,255,.07);
  --r:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);min-height:100vh}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(160deg,#04091a 0%,#0c1d40 50%,#04091a 100%);
  border-bottom:2px solid var(--orange);
  box-shadow:0 4px 32px rgba(0,0,0,.7);
  position:sticky;top:0;z-index:100;
}
.hdr-inner{
  max-width:920px;margin:0 auto;
  padding:.9rem 1rem .3rem;
  display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:.7rem}
.brand-icon{font-size:2.2rem;line-height:1;filter:drop-shadow(0 2px 8px rgba(244,111,0,.4))}
.brand-text .t1{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.6rem;letter-spacing:3px;line-height:1;
}
.brand-text .t1 span{color:var(--orange)}
.brand-text .t2{font-size:.62rem;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:1px}
.live-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(0,230,118,.12);border:1px solid var(--live);
  border-radius:20px;padding:4px 10px;
  font-size:.68rem;font-weight:700;color:var(--live);
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.live-pill.on{opacity:1}
.live-dot{width:6px;height:6px;background:var(--live);border-radius:50%;animation:blink 1.1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── TABS ── */
.tabs{max-width:920px;margin:0 auto;display:flex;padding:0 .25rem}
.tab{
  flex:1;padding:.55rem .25rem .45rem;text-align:center;
  font-size:.78rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;
  transition:all .2s;user-select:none;
}
.tab:hover{color:var(--white)}
.tab.on{color:var(--orange);border-bottom-color:var(--orange)}

/* ── BRASIL TAB ── */
.tab-bra{font-size:.82rem}
.tab-bra.on{color:#f4e642;border-bottom-color:#009c3b;background:rgba(0,156,59,.1)}

/* ── CONTENT ── */
.wrap{max-width:920px;margin:0 auto;padding:1rem}
.sec{display:none}.sec.on{display:block}

/* ── BRASIL HERO ── */
.bra-hero{
  display:flex;align-items:center;gap:1rem;
  background:linear-gradient(135deg,#003d1a 0%,#005723 50%,#003d1a 100%);
  border:1px solid rgba(0,156,59,.4);border-radius:var(--r);
  padding:1rem 1.2rem;margin-bottom:1rem;
}
.bra-flag{font-size:3.2rem;line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.bra-info .bra-title{
  font-family:'Bebas Neue',sans-serif;font-size:1.4rem;
  letter-spacing:2px;color:#f4e642;line-height:1;
}
.bra-info .bra-sub{font-size:.75rem;color:rgba(255,255,255,.6);margin-top:3px}
.bra-ranking{
  margin-left:auto;text-align:center;
  background:rgba(244,230,66,.1);border:1px solid rgba(244,230,66,.3);
  border-radius:10px;padding:.5rem .8rem;
}
.bra-ranking .rk-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#f4e642;line-height:1}
.bra-ranking .rk-lbl{font-size:.65rem;color:rgba(255,255,255,.5);letter-spacing:1px}

/* ── GAME CARD ── */
.gcard{
  background:var(--card);
  border:1px solid rgba(255,255,255,.14);
  border-radius:var(--r);
  padding:.85rem 1rem;
  margin-bottom:.6rem;
  transition:border-color .2s;
}
.gcard:hover{border-color:rgba(244,111,0,.5)}
.gcard.live-card{
  border-color:var(--live);
  background:linear-gradient(135deg,var(--card),rgba(0,230,118,.06));
  animation:cardPulse 2.5s ease-in-out infinite;
}
@keyframes cardPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.15)}
  50%{box-shadow:0 0 0 6px rgba(0,230,118,0)}
}
.gmeta{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;flex-wrap:wrap}
.gdate{font-size:.7rem;color:var(--muted);font-weight:600}
.venue{font-size:.7rem;color:var(--muted);flex:1;text-align:right}
.grp{
  font-size:.62rem;font-weight:800;letter-spacing:1px;
  background:rgba(244,111,0,.15);border:1px solid rgba(244,111,0,.35);
  color:var(--orange);border-radius:6px;padding:2px 7px;
}
.gteams{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.gteam{
  flex:1;display:flex;align-items:center;gap:.45rem;
  font-size:.9rem;font-weight:700;
}
.gteam.right{flex-direction:row-reverse;text-align:right}
.gteam .flag{font-size:1.3rem;line-height:1}
.gscore{
  font-family:'Bebas Neue',sans-serif;font-size:1.6rem;
  letter-spacing:2px;color:var(--white);
  min-width:80px;text-align:center;
}
.gscore.live{color:var(--live)}
.gscore.fin{color:var(--orange2)}
.gstatus{
  font-size:.68rem;font-weight:800;letter-spacing:1.5px;
  text-transform:uppercase;text-align:center;
  display:flex;align-items:center;justify-content:center;gap:.3rem;
}
.gstatus:empty{display:none}
.gstatus.live{color:var(--live)}
.gstatus.fin{color:var(--muted)}
.gstatus.sched{color:rgba(255,255,255,.35)}
.gstatus .ldot{
  width:5px;height:5px;border-radius:50%;background:var(--live);
  animation:blink 1s infinite;
}

/* ── SETS ── */
.sets-row{
  display:flex;gap:.3rem;justify-content:center;
  margin-top:.35rem;
  font-size:.7rem;font-weight:700;color:var(--muted);
}
.set-num{
  background:rgba(255,255,255,.08);border-radius:5px;
  padding:2px 7px;
}
.set-num.won{background:rgba(244,111,0,.2);color:var(--orange2)}
.set-num.won-away{background:rgba(100,160,255,.12);color:rgba(160,200,255,.7)}
.set-num.cur{background:rgba(0,230,118,.15);color:var(--live);font-weight:900;border:1px solid rgba(0,230,118,.3);animation:pulse-set 1.6s ease-in-out infinite}
@keyframes pulse-set{0%,100%{opacity:1}50%{opacity:.6}}

/* ── DATE HEADER ── */
.date-hdr{
  font-family:'Bebas Neue',sans-serif;letter-spacing:2px;
  font-size:1rem;color:var(--muted);
  padding:.5rem 0 .3rem;margin-top:.4rem;
  border-bottom:1px solid var(--border);margin-bottom:.5rem;
}
.week-hdr{
  font-family:'Bebas Neue',sans-serif;letter-spacing:3px;
  font-size:1.1rem;color:var(--orange);
  padding:.8rem 0 .3rem;margin-top:.6rem;
  display:flex;align-items:center;gap:.5rem;
}
.week-badge{
  font-size:.65rem;font-weight:800;letter-spacing:1px;
  background:rgba(244,111,0,.15);border:1px solid rgba(244,111,0,.3);
  color:var(--orange);border-radius:6px;padding:3px 8px;
  text-transform:uppercase;font-family:'Inter',sans-serif;
}

/* ── LIVE LINK BUTTON ── */
.live-btn{
  display:inline-flex;align-items:center;gap:.35rem;
  background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.4);
  color:var(--live);border-radius:8px;padding:4px 10px;
  font-size:.68rem;font-weight:800;letter-spacing:.5px;
  text-decoration:none;cursor:pointer;transition:all .2s;
  text-transform:uppercase;
}
.live-btn:hover{background:rgba(0,230,118,.2)}
.result-btn{
  display:inline-flex;align-items:center;gap:.35rem;
  background:rgba(244,111,0,.1);border:1px solid rgba(244,111,0,.3);
  color:var(--orange2);border-radius:8px;padding:4px 10px;
  font-size:.68rem;font-weight:800;letter-spacing:.5px;
  text-decoration:none;cursor:pointer;transition:all .2s;
}
.result-btn:hover{background:rgba(244,111,0,.2)}

/* ── LOADING / SPINNER ── */
.spinner{
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:.75rem;padding:3rem 0;
  color:var(--muted);font-size:.8rem;font-weight:600;letter-spacing:1px;
}
.spin{
  width:32px;height:32px;border:3px solid rgba(244,111,0,.2);
  border-top-color:var(--orange);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMPTY ── */
.empty{
  text-align:center;padding:3rem 1rem;
  color:var(--muted);font-size:.85rem;
}
.empty .em-icon{font-size:2.5rem;margin-bottom:.75rem}

/* ── ACCORDION ── */
.acc-hdr{cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between}
.acc-hdr:active{opacity:.75}
.acc-arrow{font-size:.8rem;color:var(--muted);flex-shrink:0}

/* ── STANDINGS TABLE ── */
.st-wrap{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.st-tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.st-tbl th{
  padding:.5rem .4rem;text-align:center;
  color:var(--muted);font-size:.62rem;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;border-bottom:2px solid var(--border);
  white-space:nowrap;background:var(--surf);
}
.st-tbl th.tl{text-align:left;padding-left:.75rem}
.st-tbl td{padding:.6rem .4rem;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;vertical-align:middle}
.st-tbl td.tl{text-align:left;padding-left:.75rem}
.st-tbl tr:hover td{background:rgba(255,255,255,.03)}
.st-pos{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--muted);width:24px;padding-right:.5rem!important}
.st-pos.top3{color:var(--orange)}
.st-pos.q8{color:#f4e642}
.st-team-cell{display:flex;align-items:center;gap:.45rem;font-weight:700;font-size:.83rem;white-space:nowrap}
.st-pts{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;color:var(--orange2)}
.st-bra td{background:rgba(0,156,59,.08)!important}
.st-bra td:first-child{border-left:3px solid #009c3b}
.st-note{font-size:.68rem;color:var(--muted);text-align:center;padding:.6rem;border-top:1px solid var(--border)}

/* ── SECTION HEADER ── */
.sec-header{
  display:flex;align-items:center;gap:.5rem;
  margin-bottom:.75rem;
}
.sec-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.15rem;letter-spacing:2px;color:var(--orange);
}
.today-badge{
  font-size:.65rem;font-weight:800;letter-spacing:1px;
  background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.35);
  color:var(--live);border-radius:6px;padding:3px 8px;
  text-transform:uppercase;
}

/* ── VNL CTA ── */
.vnl-cta{
  background:linear-gradient(135deg,rgba(244,111,0,.12),rgba(244,111,0,.06));
  border:1px solid rgba(244,111,0,.25);
  border-radius:var(--r);padding:.85rem 1rem;
  margin-bottom:1rem;
  display:flex;align-items:center;gap:1rem;
}
.vnl-cta .cta-icon{font-size:1.8rem}
.vnl-cta .cta-text .ct1{font-weight:800;font-size:.85rem;margin-bottom:2px}
.vnl-cta .cta-text .ct2{font-size:.72rem;color:var(--muted)}
.vnl-cta .cta-link{
  margin-left:auto;display:inline-flex;align-items:center;gap:.35rem;
  background:var(--orange);color:#fff;
  border-radius:8px;padding:7px 14px;
  font-size:.72rem;font-weight:800;letter-spacing:.5px;
  text-decoration:none;white-space:nowrap;flex-shrink:0;
}

/* ── MOBILE ── */
@media(max-width:480px){
  .gteam{font-size:.8rem}
  .gscore{font-size:1.35rem;min-width:64px}
  .vnl-cta{flex-wrap:wrap}
  .vnl-cta .cta-link{margin-left:0}
  .bra-ranking{display:none}
}
</style>
</head>
<body>

<header class="hdr">

  <!-- BRASIL -->

      <div class="today-badge" id="standingsBadge">VNL 2026</div>
    </div>
    <div id="standingsContent">
      <div class="spinner"><div class="spin"></div>Carregando…</div>
    </div>
  </section>

</main>

const BASE_URL = 'https://en.volleyballworld.com/volleyball/competitions/volleyball-nations-league/schedule/';

// ── SCORE FETCHING ──
const scoreCache = {};

async function fetchScore(id) {
  if (scoreCache[id]) return scoreCache[id];

  // 1ª tentativa: API live (CORS ok, funciona para jogos encerrados recentes)
  try {
    const sc = await fetchLiveScore(id);
    if (sc && (sc.homeSets + sc.awaySets) > 0) {
      scoreCache[id] = sc;
      return sc;
    }
  } catch(e) {}

  // 2ª tentativa: HTML via CORS proxy (jogos encerrados horas atrás)
  const matchUrl = BASE_URL + id + '/';
  for (const proxy of [
    'https://corsproxy.io/?' + encodeURIComponent(matchUrl),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(matchUrl),
  ]) {
    try {
      const r = await fetch(proxy, {signal: AbortSignal.timeout(8000)});
      if (!r.ok) continue;
      const html = await r.text();
      const sc = parseScoreHtml(html, false);
      if (sc) { scoreCache[id] = sc; return sc; }
    } catch(e) {}
  }

  return null;
}

// ── VNL Real-time API (used for live games) ──
let _liveToken = null, _liveTokenExpMs = 0;

async function getLiveToken() {
  if (_liveToken && Date.now() < _liveTokenExpMs - 120000) return _liveToken;
  try {
    const r = await fetch('https://auth-api.volleyballworld.com/api/gameday/anonymous-token', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}'
    });
    const d = await r.json();
    _liveToken = d.token;
    try {
      const payload = JSON.parse(atob(_liveToken.split('.')[1]));
      _liveTokenExpMs = payload.exp * 1000;
    } catch(e) { _liveTokenExpMs = Date.now() + 23 * 3600 * 1000; }
    return _liveToken;
  } catch(e) { _liveTokenExpMs = Date.now() + 60000; return null; } // backoff 60s em falha
}

async function fetchLiveScore(id) {
  try {
    const token = await getLiveToken();
    const r = await fetch(`https://en-live.volleyballworld.com/api/v1/live/matches/${id}`,
      token ? {headers: {'Authorization': `Bearer ${token}`}} : {});
    if (!r.ok) return null;
    const d = await r.json();
    const sets = (d.sets || []).filter(s => s.no > 0).map(s => ({a: s.pointsTeamA, b: s.pointsTeamB}));
    const sc = {
      homeSets: d.matchPointsA || 0,
      awaySets: d.matchPointsB || 0,
      sets,
      done: !!d.statusLabel && d.statusLabel !== 'Live'
    };
    recomputeSets(sc); // recalcula a partir dos sets individuais, corrige matchPoints desatualizados
    return sc;
  } catch(e) { return null; }
}

function findScoreInObj(obj, depth=0) {
  if (depth > 10 || !obj || typeof obj !== 'object') return null;
  // If object has score AND sets array → ideal match-level object, return immediately
  if (typeof obj.homeTeamScore === 'number' && typeof obj.awayTeamScore === 'number') {
    const rawSets = obj.sets || obj.matchSets || obj.setResults || [];
    const sets = rawSets.map(s => ({
      a: s.homeTeamScore ?? s.homeScore ?? s.pointsA ?? 0,
      b: s.awayTeamScore ?? s.awayScore ?? s.pointsB ?? 0
    }));
    if (sets.length > 0) return { homeSets: obj.homeTeamScore, awaySets: obj.awayTeamScore, sets };
  }
  // Search children, prefer any result that has a sets array
  let fallback = null;
  for (const v of Object.values(obj)) {
    const r = findScoreInObj(v, depth+1);
    if (r) {
      if (r.sets && r.sets.length > 0) return r;
      if (!fallback) fallback = r;
    }
  }
  if (fallback) return fallback;
  // Last resort: score without sets
  if (typeof obj.homeTeamScore === 'number' && typeof obj.awayTeamScore === 'number') {
    return { homeSets: obj.homeTeamScore, awaySets: obj.awayTeamScore, sets: [] };
  }
  return null;
}

function recomputeSets(score) {
  if (!score || !score.sets || !score.sets.length) return;
  let h = score.sets.filter(s => s.a > s.b && s.a >= 25 && s.a - s.b >= 2).length;
  let a = score.sets.filter(s => s.b > s.a && s.b >= 25 && s.b - s.a >= 2).length;
  // 5th set tiebreak (played to 15)
  if (score.sets.length >= 5) {
    const s5 = score.sets[4];
    if (s5.a > s5.b && s5.a >= 15 && s5.a - s5.b >= 2) h++;
    else if (s5.b > s5.a && s5.b >= 15 && s5.b - s5.a >= 2) a++;
  }
  if (h + a > 0) { score.homeSets = h; score.awaySets = a; }
}

function parseScoreHtml(html, isLive=false) {
  let score = null;
  // Método 1: regex em elementos HTML
  const hm = html.match(/score--home[^>]*>(\d+)/) || html.match(/score__home[^>]*>(\d+)/);
  const am = html.match(/score--away[^>]*>(\d+)/) || html.match(/score__away[^>]*>(\d+)/);
  if (hm && am) {
    const pA = [...html.matchAll(/pointA[^>]*>(\d+)/g)].map(m=>+m[1]);
    const pB = [...html.matchAll(/pointB[^>]*>(\d+)/g)].map(m=>+m[1]);
    const sets = Array.from({length:Math.min(pA.length,pB.length,5)},(_,i)=>({a:pA[i],b:pB[i]}));
    score = { homeSets: +hm[1], awaySets: +am[1], sets };
  }
  // Método 2: JSON embutido do Next.js
  if (!score) {
    try {
      const nm = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]+?)<\/script>/);
      if (nm) score = findScoreInObj(JSON.parse(nm[1]));
    } catch(e) {}
  }
  if (!score) return null;
  // Recompute set wins from individual set scores (corrects stale/wrong match-level fields)
  recomputeSets(score);
  if (!isLive && Math.max(score.homeSets, score.awaySets) !== 3) return null;
  return score;
}

const _forceFin = new Set(JSON.parse(sessionStorage.getItem('vnl_fin') || '[]'));

function refreshWeekBadges() {
  document.querySelectorAll('.week-badge[data-ids]').forEach(el => {
    const ids = el.dataset.ids.split(',');
    const total = +el.dataset.total;
    const done = ids.filter(id => {
      const card = document.querySelector(`.gcard[data-id="${id}"]`);
      return card && card.dataset.status === 'fin';
    }).length;
    const sep = el.textContent.includes('jogos') ? ' jogos' : '';
    el.textContent = `${done}/${total}${sep}`;
  });
}
const _liveManaged = new Set(); // games being refreshed by live API — watchStatuses won't touch them

function flipTofin(id) {
  _forceFin.add(id);
  try { sessionStorage.setItem('vnl_fin', JSON.stringify([..._forceFin])); } catch(e) {}
  const card = document.querySelector(`.gcard[data-id="${id}"]`);
  if (card) { card.dataset.status = 'fin'; card.classList.remove('live-card'); }
  const statusEl = document.querySelector(`.gstatus[data-id="${id}"]`);
  if (statusEl) { statusEl.className = 'gstatus fin'; statusEl.textContent = 'Encerrado'; }
  document.querySelectorAll(`.score-el[data-id="${id}"]`).forEach(el => {
    el.classList.remove('live'); el.classList.add('fin');
  });
  // Atualiza badges de semana (Brasil e Agenda)
  refreshWeekBadges();
  // Atualiza o livePill se não houver mais nenhum jogo ao vivo
  const pill = document.getElementById('livePill');
  if (pill && pill.classList.contains('on')) {
    const anyLive = document.querySelector('.gcard.live-card');
    if (!anyLive) pill.classList.remove('on');
  }
}

function updateScoreDom(id, sc, isLive=false) {
  // If live fetch returned a completed score → match is over
  if (isLive && sc && (sc.done || Math.max(sc.homeSets || 0, sc.awaySets || 0) === 3)) {
    flipTofin(id);
    isLive = false;
  }

  document.querySelectorAll(`.score-el[data-id="${id}"]`).forEach(el => {
    if (sc) {
      el.textContent = sc.homeSets + '–' + sc.awaySets;
      if (isLive) { el.classList.add('live'); el.classList.remove('fin'); }
    } else if (!isLive) {
      el.textContent = '—';
    }
  });

  if (sc && sc.sets.length) {
    let curLabel = '';
    const setsHtml = sc.sets.map((s, i) => {
      const needed = i === 4 ? 15 : 25;
      const done   = (s.a >= needed || s.b >= needed) && Math.abs(s.a - s.b) >= 2;
      const isLast = isLive && i === sc.sets.length - 1;
      if (isLast && !done) {
        if (s.a > 0 || s.b > 0) return `<span class="set-num cur">${s.a}·${s.b}</span>`;
        curLabel = `<span class="set-num cur">SET ${i + 1}</span>`;
        return '';
      }
      return `<span class="set-num${done ? (s.a > s.b ? ' won' : ' won-away') : ''}">${s.a}-${s.b}</span>`;
    }).join('');

    // All sets in array are done but game is live → next set just started (API not updated yet)
    if (isLive && !curLabel && sc.sets.length < 5) {
      const allDone = sc.sets.every((s, i) => {
        const needed = i === 4 ? 15 : 25;
        return (s.a >= needed || s.b >= needed) && Math.abs(s.a - s.b) >= 2;
      });
      if (allDone) curLabel = `<span class="set-num cur">SET ${sc.sets.length + 1}</span>`;
    }

    document.querySelectorAll(`.sets-el[data-id="${id}"]`).forEach(se => {
      se.innerHTML = setsHtml + curLabel;
    });
  }
}

function loadScores(games) {
  const fin  = games.filter(g => getStatus(g.date) === 'fin');
  const live = games.filter(g => getStatus(g.date) === 'live');

  if (fin.length) {
    // Sequential (1 game at a time) to avoid rate-limiting on CORS proxies
    (async () => {
      for (const g of fin) {
        updateScoreDom(g.id, await fetchScore(g.id));
        if (fin.length > 1) await new Promise(r => setTimeout(r, 700));
      }
    })();
  }

  if (live.length) {
    // Re-apply fin state to any NEW DOM elements for games already confirmed done
    live.filter(g => _forceFin.has(g.id)).forEach(g => {
      flipTofin(g.id);
      fetchScore(g.id).then(sc => { if (sc) updateScoreDom(g.id, sc, false); });
    });

    const refreshLive = async () => {
      for (const g of live) {
        if (_forceFin.has(g.id)) continue;
        // Time window expired while we were polling — game is definitely over
        if (getStatus(g.date) === 'fin') {
          flipTofin(g.id);
          fetchScore(g.id).then(sc => { if (sc) updateScoreDom(g.id, sc, false); });
          continue;
        }
        let sc = await fetchLiveScore(g.id);
        // If live API returned 0-0 (match ended but data purged), fall through to CORS proxy
        if (!sc || (sc.homeSets + sc.awaySets === 0 && sc.done)) {
          const scProxy = await fetchScore(g.id);
          if (scProxy) { flipTofin(g.id); updateScoreDom(g.id, scProxy, false); continue; }
          if (sc) updateScoreDom(g.id, sc, true);
          continue;
        }
        updateScoreDom(g.id, sc, true);
      }
    };
    refreshLive();
    // Track which game IDs are under live-API management so watchStatuses leaves them alone
    live.forEach(g => _liveManaged.add(g.id));
    const iv = setInterval(() => {
      if (live.every(g => _forceFin.has(g.id))) { clearInterval(iv); return; }
      refreshLive();
    }, 20000);
  }

  watchStatuses(games);
}

const _watching = new Set();
function watchStatuses(games) {
  const fresh = games.filter(g => !_watching.has(g.id));
  if (!fresh.length) return;
  fresh.forEach(g => _watching.add(g.id));

  const wIv = setInterval(() => {
    if (fresh.every(g => _forceFin.has(g.id) || getStatus(g.date) === 'fin')) { clearInterval(wIv); return; }
    fresh.forEach(g => {
      if (_forceFin.has(g.id)) return;
      // Live-managed games: let the live-refresh loop handle them, UNLESS the time window has now expired
      if (_liveManaged.has(g.id)) {
        if (getStatus(g.date) !== 'fin') return;
        flipTofin(g.id);
        fetchScore(g.id).then(sc => { if (sc) updateScoreDom(g.id, sc, false); });
        return;
      }

      const card = document.querySelector(`.gcard[data-id="${g.id}"]`);
      if (!card) return;
      const was = card.dataset.status;
      const now = getStatus(g.date);
      if (was === now) return;
      card.dataset.status = now;
      card.classList.toggle('live-card', now === 'live');

      const scoreEl  = document.querySelector(`.score-el[data-id="${g.id}"]`);
      const statusEl = document.querySelector(`.gstatus[data-id="${g.id}"]`);
      const setsEl   = document.querySelector(`.sets-el[data-id="${g.id}"]`);

      if (now === 'live') {
        if (scoreEl)  { scoreEl.className='gscore live score-el'; scoreEl.removeAttribute('style'); scoreEl.textContent='·–·'; }
        if (statusEl) { statusEl.className='gstatus live'; statusEl.innerHTML='<span class="ldot"></span> Ao Vivo'; }
        if (setsEl)   setsEl.style.display='';
        const pill = document.getElementById('livePill'); if (pill) pill.classList.add('on');
        const doFetch = async () => {
          if (_forceFin.has(g.id) || getStatus(g.date) !== 'live') return;
          let sc = await fetchLiveScore(g.id);
          if (!sc) { const scHtml = await fetchScore(g.id); if (scHtml) { flipTofin(g.id); updateScoreDom(g.id, scHtml, false); return; } }
          updateScoreDom(g.id, sc, true);
        };
        doFetch();
        const lv = setInterval(()=>{ if(_forceFin.has(g.id)||getStatus(g.date)!=='live'){clearInterval(lv);return;} doFetch(); },20000);
      } else if (now === 'fin') {
        if (scoreEl)  { scoreEl.className='gscore fin score-el'; scoreEl.removeAttribute('style'); if(scoreEl.textContent==='·–·') scoreEl.textContent='···'; }
        if (statusEl) { statusEl.className='gstatus fin'; statusEl.textContent='Encerrado'; }
        if (setsEl)   setsEl.style.display='';
        fetchScore(g.id).then(sc => { if(sc) updateScoreDom(g.id,sc,false); });
      }
    });
  }, 20000);
}

// ── Helpers ──
const WD     = ['dom','seg','ter','qua','qui','sex','sáb'];
const MON    = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const CITY_PT = {Ankara:'Ancara', Bangkok:'Bangkok', 'Pasig City':'Manila', Osaka:'Osaka', Brasília:'Brasília'};

function fmtDate(d){
  return `${WD[d.getDay()]}, ${d.getDate()} ${MON[d.getMonth()]}`;
}
function fmtTime(d){
  return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
// Extrai hora do local do jogo diretamente da string ISO (ex: "2026-06-17T14:00:00+03:00" → "14:00")
function isoVt(iso){ return (iso.match(/T(\d{2}:\d{2})/)||[])[1]||''; }
// Extrai data do local do jogo diretamente da string ISO (ex: "2026-06-17T14:00:00+03:00" → "qua, 17 jun")
function isoVday(iso){
  const [y,m,d]=iso.slice(0,10).split('-').map(Number);
  const dt=new Date(y,m-1,d);
  return `${WD[dt.getDay()]}, ${d} ${MON[m-1]}`;
}
function isSameDay(a,b){
  return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
}

function getStatus(d){
  const now = Date.now();
  const ms  = d.getTime();
  if(ms > now) return 'sched';
  if(ms > now - 5*3600*1000) return 'live'; // janela ampla; placar 3-X encerra antes via _forceFin
  return 'fin';
}

function matchLink(id){
  return `${BASE_URL}${id}/`;
}


function cardHtml(g, showDate=false){
  const status = (_forceFin.has(g.id) || getStatus(g.date) === 'fin') ? 'fin' : getStatus(g.date);
  const isLive = status === 'live';
  const isFin  = status === 'fin';
  const isBra  = g.bra || g.home === 'Brazil' || g.away === 'Brazil';

  const localT   = fmtTime(g.date);
  const cityLabel = CITY_PT[g.city] || g.city || '';
  const dateStr  = showDate
    ? `${g.vday} · ${g.vt}${cityLabel ? ' ('+cityLabel+')' : ''}`
    : `${g.vt}${cityLabel ? ' ('+cityLabel+')' : ''}`;
  const venueStr = g.city && g.city !== 'Final' ? `📍 ${cityLabel}` : (g.city==='Final'?'🏆 Final':' ');

  const scoreHtml = isFin
    ? `<span class="gscore fin score-el" data-id="${g.id}">···</span>`
    : isLive
    ? `<span class="gscore live score-el" data-id="${g.id}">·–·</span>`
    : `<span class="gscore score-el" data-id="${g.id}" style="font-size:1.1rem;color:rgba(255,255,255,.55)">${localT}</span>`;

  const statusHtml = isFin
    ? `<span class="gstatus fin" data-id="${g.id}">Encerrado</span>`
    : isLive
    ? `<span class="gstatus live" data-id="${g.id}"><span class="ldot"></span> Ao Vivo</span>`
    : `<span class="gstatus" data-id="${g.id}"></span>`;

  const setsRow = `<div class="sets-row sets-el" data-id="${g.id}"${!(isFin||isLive)?' style="display:none"':''}></div>`;

  const liveBtn = '';

  const braHighlight = isBra ? 'border-color:rgba(0,156,59,.5);background:linear-gradient(135deg,var(--card),rgba(0,156,59,.05));' : '';

  return `
<div class="gcard${isLive?' live-card':''}" data-id="${g.id}" data-status="${status}" style="${braHighlight}">
  <div class="gmeta">
    <span class="gdate">${dateStr}</span>
    <span class="venue">${venueStr}</span>
  </div>
  <div class="gteams">
    <div class="gteam">
      <span class="flag">${f(g.home)}</span>
      <span>${g.home}</span>
    </div>
    <div style="text-align:center">
      ${scoreHtml}
      ${statusHtml}
    </div>
    <div class="gteam right">
      <span class="flag">${f(g.away)}</span>
      <span>${g.away}</span>
    </div>
  </div>
  ${setsRow}
  ${liveBtn ? `<div style="text-align:center;margin-top:.3rem">${liveBtn}</div>` : ''}
</div>`;
}

// ── Parse dates ──
function parseGames(arr){
  return arr.map(g => ({...g, date: new Date(g.iso), vt: isoVt(g.iso), vday: isoVday(g.iso), vd: g.iso.slice(0,10)}));
}

// ── Tab routing ──
let hojeBuilt = false, braBuilt = false, agendaBuilt = false, standingsBuilt = false;

function go(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('sec-'+tab).classList.add('on');
  if(tab==='hoje'    && !hojeBuilt)     { buildHoje();      hojeBuilt=true; }
  if(tab==='brasil'  && !braBuilt)      { buildBrasil(); }
  if(tab==='agenda'  && !agendaBuilt)   { buildAgenda(); }
  if(tab==='class'   && !standingsBuilt){ buildStandings(); }
}

function toggleWeek(id){
  const body  = document.getElementById(id);
  const arrow = document.getElementById('arrow-'+id);
  const open  = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  arrow.textContent  = open ? '▶' : '▼';
}

// ── HOJE ──
function buildHoje(){
  const today = new Date();
  const games = parseGames(ALL_WOMEN).filter(g => isSameDay(g.date, today));
  const el = document.getElementById('hojeContent');
  const badge = document.getElementById('todayBadge');
  const title = document.getElementById('hojeTitle');

  badge.textContent = fmtDate(today);

  // Check for live games
  const hasLive = games.some(g => !_forceFin.has(g.id) && getStatus(g.date)==='live');
  document.getElementById('livePill').classList.toggle('on', hasLive);

  if(games.length === 0){
    const allGames = parseGames(ALL_WOMEN);
    const upcoming = allGames.filter(g=>g.date>today).sort((a,b)=>a.date-b.date);
    let html = '';

    if(upcoming.length>0){
      const nextDay   = upcoming[0].date;
      const nextGames = upcoming.filter(g=>isSameDay(g.date,nextDay));
      title.textContent = 'PRÓXIMOS JOGOS';
      badge.textContent = fmtDate(nextDay);
      html += nextGames.map(g=>cardHtml(g)).join('');
    } else {
      title.textContent = 'VNL 2026';
      badge.textContent = fmtDate(today);
      html = `<div class="empty"><div class="em-icon">🏐</div>Sem jogos agendados.</div>`;
    }

    el.innerHTML = html;
    if (upcoming.length > 0) {
      const nextDay = upcoming[0].date;
      loadScores(upcoming.filter(g => isSameDay(g.date, nextDay)));
    }
    return;
  }

  el.innerHTML = games.map(cardHtml).join('');
  loadScores(games);
}

// ── BRASIL ──
function buildBrasil(){
  braBuilt = true;
  const games = parseGames(BRAZIL_MATCHES);

  // Group by week
  const weeks = {
    'Semana 1 — Brasília, Brasil 🇧🇷': games.filter(g=>g.city==='Brasília'),
    'Semana 2 — Ancara, Turquia 🇹🇷': games.filter(g=>g.city==='Ankara'),
    'Semana 3 — Osaka, Japão 🇯🇵': games.filter(g=>g.city==='Osaka'),
  };

  let html = '';
  for(const [label, wgames] of Object.entries(weeks)){
    if(!wgames.length) continue;
    const done = wgames.filter(g=>_forceFin.has(g.id)||getStatus(g.date)==='fin').length;
    html += `<div class="week-hdr">${label} <span class="week-badge" data-ids="${wgames.map(g=>g.id).join(',')}" data-total="${wgames.length}">${done}/${wgames.length} jogos</span></div>`;
    html += wgames.map(g => cardHtml({...g, bra:true})).join('');
  }

  document.getElementById('brasilContent').innerHTML = html;
  loadScores(games);
}

// ── AGENDA (todos os jogos) ──
function buildAgenda(){
  agendaBuilt = true;
  const now   = new Date();
  const games = parseGames(ALL_WOMEN).sort((a,b)=>a.date-b.date);

  const weeks = [
    {label:'Semana 1 · Jun 3–7 · Brasília 🇧🇷', from:'2026-06-03', to:'2026-06-09'},
    {label:'Semana 2 · Jun 17–21 · Ancara · Bangkok · Manila 🇹🇷🇹🇭🇵🇭', from:'2026-06-17', to:'2026-06-22'},
    {label:'Semana 3 · Jul 8–12 · Osaka 🇯🇵',   from:'2026-07-08', to:'2026-07-13'},
    {label:'Finals · Jul 22–26',                 from:'2026-07-22', to:'2026-07-27'},
  ];

  let html = `<div style="background:rgba(244,111,0,.1);border:1px solid rgba(244,111,0,.3);border-radius:10px;padding:.7rem 1rem;margin-bottom:1rem;font-size:.82rem;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;">
  🏐 <strong style="color:var(--orange)">${games.length} jogos</strong> &nbsp;·&nbsp; 18 seleções &nbsp;·&nbsp; Brasil, Turquia, Japão e Finals &nbsp;·&nbsp; Jun–Jul 2026
</div>`;

  for(const wk of weeks){
    const wFrom  = new Date(wk.from), wTo = new Date(wk.to);
    const wGames = games.filter(g=>g.date>=wFrom && g.date<wTo);
    if(!wGames.length) continue;

    const done = wGames.filter(g=>getStatus(g.date)==='fin').length;
    const wkId = 'wk-' + wk.from;

    html += `
<div class="week-hdr acc-hdr" onclick="toggleWeek('${wkId}')">
  <span>${wk.label}</span>
  <span style="display:flex;align-items:center;gap:.5rem">
    <span class="week-badge" data-ids="${wGames.map(g=>g.id).join(',')}" data-total="${wGames.length}">${done}/${wGames.length}</span>
    <span class="acc-arrow" id="arrow-${wkId}">▼</span>
  </span>
</div>
<div id="${wkId}">`;

    // Group by venue date
    const byDay = {};
    for(const g of wGames){
      const k = g.vd;
      if(!byDay[k]) byDay[k] = {vday:g.vday, games:[]};
      byDay[k].games.push(g);
    }
    for(const {vday, games:dg} of Object.values(byDay)){
      html += `<div class="date-hdr" style="font-size:.82rem;color:rgba(255,255,255,.38)">── ${vday}</div>`;
      html += dg.map(g=>cardHtml(g, true)).join('');
    }
    html += '</div>';
  }

  const badge = document.querySelector('#sec-agenda .today-badge');
  if(badge) badge.textContent = `${games.length} jogos · 18 seleções`;
  document.getElementById('agendaContent').innerHTML =
    html || `<div class="empty"><div class="em-icon">📋</div>Nenhum jogo encontrado.</div>`;
  loadScores(games);
}

// ── CLASSIFICAÇÃO ──
async function buildStandings(){
  standingsBuilt = true;
  const el = document.getElementById('standingsContent');
  try {
    const r    = await fetch('https://en.volleyballworld.com/volleyball/competitions/volleyball-nations-league/standings/women/');
    const html = await r.text();
    const teams = parseStandingsHtml(html);
    if(!teams.length) throw new Error('empty');
    el.innerHTML = renderStandings(teams);
  } catch(e){
    el.innerHTML = `<div class="empty"><div class="em-icon">📊</div>Não foi possível carregar. Tente de novo.<br><br>
      <span onclick="standingsBuilt=false;buildStandings()" style="color:var(--orange);cursor:pointer;font-weight:700">↻ Tentar novamente</span></div>`;
    standingsBuilt = false;
  }
}

function parseStandingsHtml(html){
  const idx   = html.indexOf('vbw-o-table__body');
  if (idx === -1) return [];
  const chunk = html.slice(idx, idx+40000);
  const rows  = chunk.split('<tr class="vbw-o-table__row').slice(1);
  const teams = [];
  for(const row of rows){
    const pos  = row.match(/position[^>]*>(\d+)/);
    const team = row.match(/alt=([A-Z]+)>([^<]+)<\/a>/);
    const mw   = row.match(/matcheswon[^>]+>(\d+)/);
    const ml   = row.match(/matcheslost[^>]+>(\d+)/);
    const sw   = row.match(/setswon[^>]+>(\d+)/);
    const sl   = row.match(/setslost[^>]+>(\d+)/);
    const pts  = row.match(/matchpoints[^>]+>(\d+)/);
    const sr   = row.match(/setsratio[^>]+>([0-9.]+)/);
    if(pos && team && pts){
      teams.push({
        rank: +pos[1], code: team[1], name: team[2],
        mw:+(mw?.[1]||0), ml:+(ml?.[1]||0),
        sw:+(sw?.[1]||0), sl:+(sl?.[1]||0),
        pts:+pts[1], sr:sr?.[1]||'0'
      });
    }
  }
  return teams.sort((a,b)=>a.rank-b.rank);
}

function renderStandings(teams){
  const now = new Date().toLocaleString('pt-BR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'});
  let html = `
<div class="st-wrap">
<table class="st-tbl">
<thead><tr>
  <th class="tl" style="width:24px">#</th>
  <th class="tl">Seleção</th>
  <th title="Jogos">J</th>
  <th title="Vitórias">V</th>
  <th title="Derrotas">D</th>
  <th title="Sets">Sets</th>
  <th title="Pontos">Pts</th>
</tr></thead>
<tbody>`;
  for(const t of teams){
    const isBra = t.code === 'BRA';
    const posClass = t.rank<=3 ? 'top3' : t.rank<=8 ? 'q8' : '';
    const rowClass = isBra ? ' class="st-bra"' : '';
    html += `<tr${rowClass}>
  <td class="st-pos ${posClass} tl">${t.rank}</td>
  <td class="tl"><div class="st-team-cell">${f(t.name)}<span>${t.name}</span></div></td>
  <td>${t.mw+t.ml}</td>
  <td><strong>${t.mw}</strong></td>
  <td style="color:var(--muted)">${t.ml}</td>
  <td style="font-size:.75rem">${t.sw}/${t.sl}</td>
  <td class="st-pts">${t.pts}</td>
</tr>`;
  }
  html += `</tbody></table>
<div class="st-note">Top 8 avançam para as Finals · Atualizado ${now}</div>
</div>`;
  return html;
}

// ── INIT ──
buildAgenda();
