<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Desafio 64km — Cartolina 6"×4" · 4×Tabloid (11×17")</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Lora:ital,wght@1,600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}

@media screen{
  body{font-family:'Montserrat',sans-serif;background:#555;padding-top:60px}
  .pbar{
    position:fixed;top:0;left:0;right:0;height:48px;
    background:#0d3d1f;color:#fff;
    display:flex;align-items:center;justify-content:center;gap:16px;
    font-size:13px;font-weight:700;z-index:100;
    box-shadow:0 2px 12px rgba(0,0,0,.4);
  }
  .pbtn{background:#d4a017;color:#0d1f0f;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer}
  .a3-wrap{margin:20px auto;box-shadow:0 6px 30px rgba(0,0,0,.5)}
  .qlabel{
    position:absolute;top:6px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.55);color:#fff;
    font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;
    letter-spacing:2px;padding:4px 14px;border-radius:20px;z-index:10;pointer-events:none;
  }
}

/* ── Tabloid (11"×17") wrapper — 11" width matches quadrant exactly → zero scaling ── */
.a3-wrap{
  width:11in;height:17in;
  overflow:hidden;position:relative;
  break-after:page;background:#fff;
}

/* ── Poster inside each wrapper ── */
.a3-wrap .poster{
  position:absolute;
  width:22in;height:28in;
  background:#fff;
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* Quadrant offsets — no CSS transform, just position */
.q1 .poster{top:0;     left:0}
.q2 .poster{top:0;     left:-11in}
.q3 .poster{top:-14in; left:0}
.q4 .poster{top:-14in; left:-11in}

/* ── HEADER ── */
.header{
  background:linear-gradient(160deg,#0d3d1f 0%,#1e8449 60%,#0d3d1f 100%);
  padding:0.18in 0.6in 0.15in;
  display:flex;flex-direction:column;align-items:center;text-align:center;flex-shrink:0;
}
.header-bar{width:100%;height:8px;background:linear-gradient(90deg,transparent,#d4a017,transparent);border-radius:4px;margin-bottom:0.1in}
.event-tag{font-size:13pt;font-weight:700;letter-spacing:4px;color:#d4a017;text-transform:uppercase;margin-bottom:0.06in}
.main-title{font-size:62pt;font-weight:900;line-height:1;color:#fff;margin-bottom:0.04in;letter-spacing:-2px}
.main-title span{color:#d4a017}
.subtitle{font-family:'Lora',serif;font-style:italic;font-size:14pt;color:rgba(255,255,255,.8);margin-bottom:0.06in}
.cancer-line{font-size:10pt;color:rgba(255,255,255,.7);line-height:1.5;max-width:16in}
.cancer-line strong{color:#fff}
.header-bar-bottom{width:100%;height:6px;margin-top:0.1in;background:linear-gradient(90deg,transparent,#d4a017,transparent);border-radius:4px}

/* ── GRID AREA ── */
.grid-area{flex:1;padding:0.1in 0 0.08in;display:flex;flex-direction:column;align-items:center}
.grid-label{font-size:9pt;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#1e8449;margin-bottom:0.1in;text-align:center}
.grid{display:grid;grid-template-columns:repeat(5,4in);grid-template-rows:repeat(4,6in);gap:0.1in}

/* ── Cell: dark green, white bold number ── */
.cell{border:3px solid #0a2e10;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;background:#0d3d1f;width:4in;height:6in}
.cell-num{font-size:120pt;font-weight:900;color:#fff;line-height:1;letter-spacing:-3px}
.cell-num.big2{font-size:96pt}
.cell-km{font-size:10pt;color:rgba(255,255,255,.4);font-weight:700;position:absolute;bottom:10px;right:12px}
.sticker-hint{font-size:8pt;color:rgba(255,255,255,.18);font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;margin-top:6px}
.cell-19{border-color:#d4a017;border-width:4px;border-style:solid;background:#0d3d1f}
.cell-19 .cell-num{color:#d4a017;font-size:96pt}
.cell-19 .cell-km{color:rgba(212,160,23,.5)}
.cell-19 .sticker-hint{color:rgba(212,160,23,.35)}

/* ── Participants panel ── */
.participants-cell{grid-column:5;grid-row:4;border:3px solid #1e8449;border-radius:10px;background:#0d3d1f;display:flex;flex-direction:column;align-items:center;padding:0.12in 0.1in 0.1in;overflow:hidden;width:4in;height:6in}
.part-title{font-size:9pt;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#d4a017;margin-bottom:4px;text-align:center}
.part-count{font-size:26pt;font-weight:900;color:#fff;line-height:1;margin-bottom:5px}
.part-names{font-size:7.5pt;color:rgba(255,255,255,.85);line-height:1.55;text-align:left;width:100%;padding:0 4px}
.part-names span{display:block}
.part-names .km64{color:#d4a017;font-weight:700}

/* ── FOOTER ── */
.footer{background:linear-gradient(160deg,#0d3d1f,#1a4a28);padding:0.14in 0.6in;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:0.3in}
.footer-verse{font-family:'Lora',serif;font-style:italic;font-size:12pt;color:rgba(255,255,255,.8);line-height:1.5;flex:1}
.footer-verse strong{font-style:normal;font-weight:900;color:#d4a017}
.footer-fundraiser{text-align:right;flex-shrink:0}
.footer-fundraiser .ft{font-size:8pt;font-weight:700;letter-spacing:2px;color:#d4a017;text-transform:uppercase;margin-bottom:3px}
.footer-fundraiser .fn{font-size:11pt;font-weight:900;color:#fff;line-height:1.3;margin-bottom:2px}
.footer-fundraiser .fu{font-size:8pt;color:rgba(255,255,255,.5);font-family:monospace}

@media print{
  body{background:#fff;padding:0}
  .pbar,.qlabel{display:none}
  .a3-wrap{margin:0;box-shadow:none}
  @page{size:11in 17in portrait;margin:0}
}
</style>
</head>
<body>

  <span>📋 Staples: papel <strong>Tabloid 11×17"</strong> · escala <strong>100% (sem reduzir)</strong> · sem margens · 4 folhas em ordem</span>
  <button class="pbtn" onclick="window.print()">🖨 Imprimir (4×Tabloid)</button>
</div>

      <div class="participants-cell">
        <div class="part-title">🏅 Confirmed</div>

  </div>
  <div class="footer">
    <div class="footer-verse"><strong>"I can do all things through Christ who strengthens me."</strong><br>— Philippians 4:13</div>

      <div class="ft">💛 Support the Cause</div>
      <div class="fn">Urology Wellness<br>St. Joseph's Hospital Foundation</div>
      <div class="fu">gofundme.com/f/urology-wellness-st-josephs-hospital-foundation</div>
    </div>
  </div>

<div class="a3-wrap q1"><div class="qlabel">1/4 — TOPO ESQUERDO</div><div class="poster"></div></div>
<div class="a3-wrap q2"><div class="qlabel">2/4 — TOPO DIREITO</div><div class="poster"></div></div>
<div class="a3-wrap q3"><div class="qlabel">3/4 — BAIXO ESQUERDO</div><div class="poster"></div></div>
<div class="a3-wrap q4"><div class="qlabel">4/4 — BAIXO DIREITO</div><div class="poster"></div></div>

<script>
  const tpl = document.getElementById('tpl');
  document.querySelectorAll('.a3-wrap .poster').forEach(p => {
    p.appendChild(tpl.content.cloneNode(true));
  });
</script>
</body>
</html>
