<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Desafio 64km — Coberturas das Voltas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:#e8e8e8}

@media screen{
  .pbar{
    position:fixed;top:0;left:0;right:0;height:48px;
    background:#1a3a6e;color:#fff;
    display:flex;align-items:center;justify-content:center;gap:16px;
    font-size:13px;font-weight:700;z-index:100;
    box-shadow:0 2px 12px rgba(0,0,0,.3);
  }
  .pbtn{
    background:#fff;color:#1a3a6e;border:none;border-radius:8px;
    padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;
  }
  body{padding-top:64px}
  .page{
    width:3.5in;margin:16px auto;
    background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.25);
    border-radius:4px;
  }
}

.page{
  width:3.5in;height:5.5in;
  display:flex;align-items:stretch;
  break-after:page;
}

.card{
  width:100%;height:100%;
  border:3px solid #1a3a6e;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#fff;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:10px;
  background:#1a3a6e;
}

.card::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;height:10px;
  background:#1a3a6e;
}

.num{
  font-size:140pt;font-weight:900;
  color:#1a3a6e;line-height:1;
  letter-spacing:-4px;
}

.num.big2{font-size:110pt}

@media print{
  body{background:#fff;padding:0}
  .pbar{display:none}
  .page{margin:0;box-shadow:none;border-radius:0}
  @page{size:3.5in 5.5in portrait;margin:0}
}
</style>
</head>
<body>

<div class="pbar">
  <span>Desafio 64km — Coberturas das Voltas</span>
  <button class="pbtn" onclick="window.print()">🖨 Imprimir</button>
</div>

<div class="page"><div class="card"><div class="num">1</div></div></div>
<div class="page"><div class="card"><div class="num">2</div></div></div>
<div class="page"><div class="card"><div class="num">3</div></div></div>
<div class="page"><div class="card"><div class="num">4</div></div></div>
<div class="page"><div class="card"><div class="num">5</div></div></div>
<div class="page"><div class="card"><div class="num">6</div></div></div>
<div class="page"><div class="card"><div class="num">7</div></div></div>
<div class="page"><div class="card"><div class="num">8</div></div></div>
<div class="page"><div class="card"><div class="num">9</div></div></div>
<div class="page"><div class="card"><div class="num big2">10</div></div></div>
<div class="page"><div class="card"><div class="num big2">11</div></div></div>
<div class="page"><div class="card"><div class="num big2">12</div></div></div>
<div class="page"><div class="card"><div class="num big2">13</div></div></div>
<div class="page"><div class="card"><div class="num big2">14</div></div></div>
<div class="page"><div class="card"><div class="num big2">15</div></div></div>
<div class="page"><div class="card"><div class="num big2">16</div></div></div>
<div class="page"><div class="card"><div class="num big2">17</div></div></div>
<div class="page"><div class="card"><div class="num big2">18</div></div></div>
<div class="page"><div class="card"><div class="num big2">19</div></div></div>

</body>
</html>
