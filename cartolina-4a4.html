<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Desafio 64km — Cartolina 4×A4</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Lora:ital,wght@1,600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* ─────────────────────────────────────────
   POSTER: 16.5" × 21"  (22"×28" × 0.75)
   Split: 8.25" wide × 10.5" tall per quadrant
   A4 page: 8.27" × 11.69"  → 0.02" spare right, 1.19" spare bottom
   ───────────────────────────────────────── */

/* Screen chrome */
@media screen{
  body{font-family:'Montserrat',sans-serif;background:#444;padding-top:60px}
  .pbar{
    position:fixed;top:0;left:0;right:0;height:48px;
    background:#0d3d1f;color:#fff;
    display:flex;align-items:center;justify-content:center;gap:16px;
    font-size:13px;font-weight:700;z-index:100;
    box-shadow:0 2px 12px rgba(0,0,0,.4);
  }
  .pbtn{background:#d4a017;color:#0d1f0f;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer}
  .page{margin:16px auto;box-shadow:0 4px 24px rgba(0,0,0,.5)}
  .qlabel{
    position:absolute;top:6px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.6);color:#fff;
    font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;
    letter-spacing:2px;padding:3px 12px;border-radius:20px;z-index:10;pointer-events:none;
  }
}

/* A4 page wrapper — clips to one quadrant */
.page{
  width:8.27in;
  height:11.69in;
  overflow:hidden;
  position:relative;
  break-after:page;
  background:#fff;
}

/* The full poster sits absolute inside each wrapper.
   Offset it so the correct quadrant is visible.         */
.poster{
  position:absolute;
  width:16.5in;
  height:21in;
  display:flex;flex-direction:column;
  background:#fff;
  overflow:hidden;
}

/* Quadrant offsets  (half-width=8.25in, half-height=10.5in) */
.q1 .poster{top:0;     left:0}
.q2 .poster{top:0;     left:-8.25in}
.q3 .poster{top:-10.5in;left:0}
.q4 .poster{top:-10.5in;left:-8.25in}

/* ── HEADER ── */
.header{
  background:linear-gradient(160deg,#0d3d1f 0%,#1e8449 60%,#0d3d1f 100%);
  padding:0.14in 0.45in 0.11in;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  flex-shrink:0;
}
.hbar{width:100%;height:6px;background:linear-gradient(90deg,transparent,#d4a017,transparent);border-radius:3px;margin-bottom:0.08in}
.event-tag{font-size:10pt;font-weight:700;letter-spacing:4px;color:#d4a017;text-transform:uppercase;margin-bottom:0.05in}
.main-title{font-size:47pt;font-weight:900;line-height:1;color:#fff;margin-bottom:0.03in;letter-spacing:-2px}
.main-title span{color:#d4a017}
.subtitle{font-family:'Lora',serif;font-style:italic;font-size:11pt;color:rgba(255,255,255,.8);margin-bottom:0.05in}
.cancer-line{font-size:8pt;color:rgba(255,255,255,.7);line-height:1.5;max-width:14in}
.cancer-line strong{color:#fff}
.hbar-b{width:100%;height:5px;margin-top:0.08in;background:linear-gradient(90deg,transparent,#d4a017,transparent);border-radius:3px}

/* ── GRID AREA ── */
.grid-area{flex:1;padding:0.08in 0 0.06in;display:flex;flex-direction:column;align-items:center}
.grid-label{font-size:7pt;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#1e8449;margin-bottom:0.08in;text-align:center}

/* 5 cols × 4 rows, cells 3"×4.5" (= 4"×6" × 0.75) */
.grid{
  display:grid;
  grid-template-columns:repeat(5,3in);
  grid-template-rows:repeat(4,4.5in);
  gap:0.075in;
}

/* ── Cell ── */
.cell{
  border:2px solid #0a2e10;border-radius:8px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;background:#0d3d1f;
  width:3in;height:4.5in;
}
.cell-num{font-size:90pt;font-weight:900;color:#fff;line-height:1;letter-spacing:-2px}
.cell-num.big2{font-size:72pt}
.cell-km{font-size:7.5pt;color:rgba(255,255,255,.4);font-weight:700;position:absolute;bottom:8px;right:9px}
.sticker-hint{font-size:6pt;color:rgba(255,255,255,.18);font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;margin-top:4px}
.cell-19{border-color:#d4a017;border-width:3px;background:#0d3d1f}
.cell-19 .cell-num{color:#d4a017;font-size:72pt}
.cell-19 .cell-km{color:rgba(212,160,23,.5)}
.cell-19 .sticker-hint{color:rgba(212,160,23,.35)}

/* ── Participants panel ── */
.participants-cell{
  grid-column:5;grid-row:4;
  border:2px solid #1e8449;border-radius:8px;
  background:#0d3d1f;
  display:flex;flex-direction:column;align-items:center;
  padding:0.09in 0.08in 0.08in;overflow:hidden;
  width:3in;height:4.5in;
}
.part-title{font-size:7pt;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#d4a017;margin-bottom:3px;text-align:center}
.part-count{font-size:20pt;font-weight:900;color:#fff;line-height:1;margin-bottom:4px}
.part-names{font-size:5.5pt;color:rgba(255,255,255,.85);line-height:1.5;text-align:left;width:100%;padding:0 3px}
.part-names span{display:block}
.part-names .km64{color:#d4a017;font-weight:700}

/* ── FOOTER ── */
.footer{
  background:linear-gradient(160deg,#0d3d1f,#1a4a28);
  padding:0.11in 0.45in;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:0.2in;
}
.footer-verse{font-family:'Lora',serif;font-style:italic;font-size:9pt;color:rgba(255,255,255,.8);line-height:1.5;flex:1}
.footer-verse strong{font-style:normal;font-weight:900;color:#d4a017}
.footer-fundraiser{text-align:right;flex-shrink:0}
.footer-fundraiser .ft{font-size:6pt;font-weight:700;letter-spacing:2px;color:#d4a017;text-transform:uppercase;margin-bottom:2px}
.footer-fundraiser .fn{font-size:8.5pt;font-weight:900;color:#fff;line-height:1.3;margin-bottom:2px}
.footer-fundraiser .fu{font-size:6pt;color:rgba(255,255,255,.5);font-family:monospace}

/* ── Print ── */
@media print{
  body{background:#fff;padding:0}
  .pbar,.qlabel{display:none}
  .page{margin:0;box-shadow:none}
  @page{size:A4 portrait;margin:0}
}
</style>
</head>
<body>

<div class="pbar">
